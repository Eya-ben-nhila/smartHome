# Server Configuration
server.port=8080
server.servlet.context-path=/api

# Allow circular dependencies temporarily
spring.main.allow-circular-references=true
# Allow bean definition overriding
spring.main.allow-bean-definition-overriding=true

# Database Configuration
spring.data.mongodb.uri=mongodb://localhost:27017/smart_home_db
spring.data.mongodb.database=smart_home_db
spring.data.mongodb.auto-index-creation=true

# JWT Configuration
jwt.secret=mySuperSecretJwtKeyThatIsLongEnoughForHS256Signing12345
jwt.expiration=86400000

# MQTT Configuration
mqtt.broker.url=tcp://localhost:1883
mqtt.client.id=smart-home-server
mqtt.username=mqtt_user
mqtt.password=mqtt_password

# CORS Configuration
spring.web.cors.allowed-origins=http://localhost:4200
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# Logging
logging.level.com.smarthome=DEBUG
logging.level.org.springframework.security=DEBUG
