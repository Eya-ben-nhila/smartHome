<div class="admin-users">
  <div class="header-card">
    <div>
      <h2 class="m-0">Administration des utilisateurs</h2>
      <p class="subtitle">Gerez les comptes, les roles et les activations.</p>
    </div>
    <button mat-flat-button color="primary" (click)="addUser()">
      <i class="fas fa-user-plus"></i>
      Ajouter utilisateur
    </button>
  </div>

  <table mat-table [dataSource]="users" class="users-table">
    <ng-container matColumnDef="fullName">
      <th mat-header-cell *matHeaderCellDef>Nom</th>
      <td mat-cell *matCellDef="let user; let i = index">
        <div class="user-cell">
          <img class="user-avatar" [src]="avatarUrl(user, i)" alt="avatar" />
          <span class="user-name">{{ displayName(user, i) }}</span>
        </div>
      </td>
    </ng-container>

    <ng-container matColumnDef="email">
      <th mat-header-cell *matHeaderCellDef>Email</th>
      <td mat-cell *matCellDef="let user">{{ user.email }}</td>
    </ng-container>

    <ng-container matColumnDef="role">
      <th mat-header-cell *matHeaderCellDef>Role</th>
      <td mat-cell *matCellDef="let user">
        <span class="role-badge" [class.admin]="user.role === 'ADMIN'">
          {{ user.role === 'USER' ? 'EMPLOYEE' : user.role }}
        </span>
      </td>
    </ng-container>

    <ng-container matColumnDef="enabled">
      <th mat-header-cell *matHeaderCellDef>Statut</th>
      <td mat-cell *matCellDef="let user">
        <span class="status-badge" [class.inactive]="!user.enabled">
          {{ user.enabled ? 'Actif' : 'Desactive' }}
        </span>
      </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let user" class="actions-cell">
        <button mat-stroked-button color="primary" (click)="editUser(user)">Modifier</button>
        <button mat-stroked-button color="warn" (click)="disableUser(user)">Desactiver</button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
</div>
